<p>The function trace returns the sum of the diagonal elements of the matrix <code>mtx</code>:</p>
<div>{{< katex >}}$
\mathrm{tr}(\texttt{mtx}) = \sum_i \texttt{mtx}(i,i)
${{< /katex >}}</div>
