<p>The function magnitude calculates the magnitude of 2D vectors formed from the corresponding elements of <code>x</code> and <code>y</code> arrays:</p>

<div>{{< katex >}}$
\texttt{dst}(I) = \sqrt{\texttt{x}(I)^2 + \texttt{y}(I)^2}
${{< /katex >}}</div>
