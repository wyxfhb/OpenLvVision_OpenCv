<p>If scale or mean values are specified, a final input blob is computed as:</p>

<div>{{< katex >}}$
\texttt{input}(n,c,h,w)
= \texttt{scalefactor}\,\times\,
\big(\texttt{blob}(n,c,h,w) - \texttt{mean}_c\big)
${{< /katex >}}</div>
